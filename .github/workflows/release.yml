name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Generate release notes from CHANGELOG
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found" CHANGELOG.md > release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md

      - name: Warm Go module proxy
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          curl -sf "https://proxy.golang.org/github.com/boxlinknet/kwtsms-go/@v/${TAG}.info" || true
          curl -sf "https://sum.golang.org/lookup/github.com/boxlinknet/kwtsms-go@${TAG}" || true
